<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 分镜生成器 - 智能视觉版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            scrollbar-width: thin;
            scrollbar-color: #333 #0a0a0a;
            box-sizing: border-box;
        }
        body {
            font-family: 'Noto Serif SC', serif;
            background-color: #050505;
            color: #e5e5e5;
            overflow: hidden;
            font-size: 12px;
            margin: 0;
            padding: 0;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }

        /* 左侧工具栏 */
        .left-panel {
            width: 360px;
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            border-right: 1px solid #333;
            background: #0a0a0a;
            padding: 16px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        /* 左侧内容区 */
        .left-content {
            flex: 1;
            overflow-y: auto;
        }

        /* 调试信息 - 左侧底部 */
        .debug-section {
            margin-top: 12px;
            border-top: 1px solid #333;
            padding-top: 12px;
        }

        .debug-panel {
            width: 100%;
            max-height: 80px;
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 6px;
            overflow-y: auto;
        }

        .log-entry {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            line-height: 1.3;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .log-entry.error { color: #ef4444; }
        .log-entry.success { color: #10b981; }
        .log-entry.info { color: #888; }

        /* 主内容区 */
        .main-content {
            flex: 1;
            height: 100vh;
            overflow-y: auto;
            padding: 20px;
        }

        /* 组件样式 */
        .section {
            background: #111;
            border: 1px solid #333;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 4px;
        }

        .section-title {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        input, select, textarea {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #444;
            color: #fff;
            padding: 8px;
            font-size: 12px;
            border-radius: 3px;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
            line-height: 1.6;
        }

        button {
            background: #333;
            color: #fff;
            border: none;
            padding: 10px 16px;
            font-size: 12px;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.2s;
            width: 100%;
            font-family: inherit;
        }

        button:hover:not(:disabled) {
            background: #444;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button.primary {
            background: #10b981;
            color: #000;
            font-weight: bold;
        }

        button.primary:hover:not(:disabled) {
            background: #34d399;
        }

        button.small {
            padding: 6px 12px;
            font-size: 11px;
        }

        /* 视觉风格对话框 */
        .visual-style-dialog {
            background: #1a1a1a;
            border: 2px solid #444;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .visual-style-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #333;
        }

        .visual-style-title {
            font-size: 13px;
            color: #10b981;
            font-weight: bold;
        }

        .style-dimension {
            margin-bottom: 12px;
        }

        .style-dimension-label {
            font-size: 10px;
            color: #666;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .style-dimension-label::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
        }

        .style-dimension-content {
            background: #0a0a0a;
            border: 1px solid #333;
            padding: 8px;
            border-radius: 3px;
            font-size: 12px;
            line-height: 1.5;
            color: #ccc;
        }

        .style-edit-mode {
            background: #0a0a0a;
            border: 1px solid #10b981;
            padding: 12px;
            border-radius: 4px;
        }

        .style-edit-field {
            margin-bottom: 10px;
        }

        .style-edit-field label {
            display: block;
            font-size: 10px;
            color: #888;
            margin-bottom: 4px;
        }

        .style-edit-field textarea {
            background: #1a1a1a;
            border-color: #444;
            min-height: 60px;
        }

        /* 参考图区域 */
        .reference-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 8px;
        }

        .reference-item {
            aspect-ratio: 1;
            background: #1a1a1a;
            border: 2px dashed #444;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .reference-item:hover {
            border-color: #10b981;
        }

        .reference-item.uploaded {
            border-style: solid;
            border-color: #10b981;
        }

        .reference-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        .reference-item .remove-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 18px;
            height: 18px;
            background: #dc2626;
            color: #fff;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 10px;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .reference-item:hover .remove-btn {
            display: flex;
        }

        .reference-label {
            font-size: 10px;
            color: #666;
            text-align: center;
            z-index: 5;
            padding: 4px;
            background: rgba(0,0,0,0.7);
            width: 100%;
            position: absolute;
            bottom: 0;
        }

        .reference-status {
            position: absolute;
            top: 2px;
            left: 2px;
            background: #10b981;
            color: #000;
            font-size: 9px;
            padding: 2px 4px;
            border-radius: 2px;
            font-weight: bold;
            z-index: 10;
        }

        .add-more-ref {
            aspect-ratio: 1;
            background: #1a1a1a;
            border: 2px dashed #555;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #666;
        }

        .add-more-ref:hover {
            border-color: #10b981;
            color: #10b981;
        }

        /* 分镜展示区 */
        .storyboard-display {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }

        .shot-card {
            background: #111;
            border: 1px solid #333;
            border-radius: 6px;
            overflow: hidden;
        }

        .shot-card.generating {
            border-color: #f59e0b;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .shot-image {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            position: relative;
        }

        .shot-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .shot-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #444;
            gap: 8px;
        }

        .shot-info {
            padding: 12px;
        }

        .shot-number {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #10b981;
            margin-bottom: 6px;
        }

        .shot-content {
            font-size: 12px;
            line-height: 1.5;
            color: #ccc;
            margin-bottom: 8px;
        }

        .shot-refs {
            font-size: 10px;
            color: #666;
            margin-bottom: 8px;
            padding: 6px;
            background: rgba(255,255,255,0.02);
            border-radius: 3px;
        }

        .shot-refs.has-ref {
            color: #10b981;
            background: rgba(16, 185, 129, 0.05);
        }

        .shot-actions {
            display: flex;
            gap: 8px;
        }

        .shot-actions button {
            flex: 1;
        }

        /* 编辑模式 */
        .shot-edit-mode {
            padding: 12px;
            background: #1a1a1a;
        }

        .edit-field {
            margin-bottom: 8px;
        }

        .edit-field label {
            display: block;
            font-size: 10px;
            color: #888;
            margin-bottom: 4px;
        }

        /* 其他 */
        .upload-zone {
            border: 2px dashed #444;
            background: rgba(255,255,255,0.02);
            padding: 16px;
            text-align: center;
            border-radius: 4px;
            cursor: pointer;
        }

        .upload-zone:hover {
            border-color: #10b981;
        }

        .hidden { display: none; }

        .error-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 10px;
            border-radius: 4px;
            margin-top: 8px;
            font-size: 11px;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #333;
            border-top-color: #10b981;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="flex h-screen">
        <!-- 左侧工具栏 -->
        <div class="left-panel">
            <div class="left-content">
                <!-- Header -->
                <div class="section" style="background: transparent; border: none; padding: 0 0 16px 0;">
                    <h1 class="text-lg font-bold tracking-tight">CINEMA<span class="text-neutral-500">_BOARD</span></h1>
                    <p class="text-xs text-neutral-500 mono mt-1">智能视觉版 v4.0</p>
                </div>

                <!-- API配置 -->
                <div class="section">
                    <div class="section-title">API 配置</div>
                    <input type="password" id="apiKey" placeholder="输入 API Key..." style="margin-bottom: 8px;">
                    <select id="apiEndpoint" style="margin-bottom: 8px;">
                        <option value="https://api.apiyi.com/v1">api.apiyi.com</option>
                        <option value="https://vip.apiyi.com/v1">vip.apiyi.com</option>
                    </select>
                    <select id="textModelSelect" style="margin-bottom: 8px;">
                        <option value="deepseek-chat">DeepSeek Chat (剧本拆解)</option>
                        <option value="gpt-4o">GPT-4o (剧本拆解)</option>
                        <option value="gpt-4o-mini">GPT-4o Mini (剧本拆解)</option>
                        <option value="gemini-2.5-flash">Gemini 2.5 Flash (剧本拆解)</option>
                    </select>
                    <div class="text-xs text-neutral-600 mb-2">
                        图像生成: nano-banana-pro (固定)
                    </div>
                </div>

                <!-- 剧本上传 -->
                <div class="section">
                    <div class="section-title">剧本上传</div>
                    <div class="upload-zone" id="uploadZone">
                        <div class="text-2xl mb-2">📄</div>
                        <div class="text-sm text-neutral-400">拖拽 Word 文档</div>
                        <div class="text-xs text-neutral-600 mt-1">.docx / .txt</div>
                        <input type="file" id="fileInput" accept=".docx,.doc,.txt" class="hidden">
                    </div>
                    <button id="analyzeBtn" class="primary mt-3" disabled onclick="analyzeScript()">
                        🤖 AI 分析剧本并生成视觉风格
                    </button>
                </div>

                <!-- 视觉风格定位 - 对话框形式 -->
                <div class="section" id="visualStyleSection" style="display: none;">
                    <div class="section-title">
                        分镜画面视觉风格定位
                        <span class="text-xs text-neutral-600" id="styleStatus">可编辑</span>
                    </div>
                    
                    <div id="visualStyleDisplay">
                        <!-- 动态生成视觉风格对话框 -->
                    </div>

                    <button class="lock-toggle-btn" id="lockStyleBtn" onclick="toggleStyleLock()" style="margin-top: 12px;">
                        🔓 锁定视觉风格
                    </button>
                </div>

                <!-- 人物设定图片参考 -->
                <div class="section" id="characterRefSection" style="display: none;">
                    <div class="section-title">
                        人物设定图片参考
                        <span class="text-xs text-neutral-600" id="charRefCount">0/10</span>
                    </div>
                    <div class="reference-grid" id="characterReferences"></div>
                    <div class="add-more-ref" onclick="addMoreCharRef()" style="margin-top: 8px;">
                        <div class="text-lg">+</div>
                        <div class="text-xs">添加人物</div>
                    </div>
                </div>

                <!-- 场景图片参考 -->
                <div class="section" id="sceneRefSection" style="display: none;">
                    <div class="section-title">
                        场景图片参考
                        <span class="text-xs text-neutral-600" id="sceneRefCount">0/10</span>
                    </div>
                    <div class="reference-grid" id="sceneReferences"></div>
                    <div class="add-more-ref" onclick="addMoreSceneRef()" style="margin-top: 8px;">
                        <div class="text-lg">+</div>
                        <div class="text-xs">添加场景</div>
                    </div>
                </div>

                <!-- 场次列表 -->
                <div class="section" id="scenesSection" style="display: none;">
                    <div class="section-title">
                        场次列表
                        <span class="text-xs text-neutral-600">勾选生成</span>
                    </div>
                    <div class="scene-list" id="scenesList"></div>
                    <button id="generateBtn" class="primary mt-3" disabled onclick="generateStoryboard()">
                        🎬 批量生成分镜
                    </button>
                    <div class="progress-container hidden" id="progressContainer" style="margin-top: 12px;">
                        <div class="progress-bar" style="height: 4px; background: #333; border-radius: 2px; overflow: hidden;">
                            <div class="progress-fill" id="progressFill" style="width: 0%; height: 100%; background: #10b981; transition: width 0.3s;"></div>
                        </div>
                        <div class="progress-text" id="progressText" style="font-size: 11px; color: #888; text-align: center; margin-top: 6px;">准备生成...</div>
                    </div>
                </div>
            </div>

            <!-- 调试信息 -->
            <div class="debug-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                    <span class="text-xs text-neutral-600">调试信息</span>
                    <button onclick="clearDebug()" class="small" style="width: auto; padding: 4px 8px; font-size: 10px;">清除</button>
                </div>
                <div id="debugPanel" class="debug-panel">
                    <div class="log-entry info">系统就绪...</div>
                </div>
            </div>
        </div>

        <!-- 右侧主内容区 -->
        <div class="main-content">
            <div id="storyboardDisplay" class="storyboard-display">
                <div class="text-center text-neutral-600 mt-20">
                    <div class="text-6xl mb-4 opacity-20">🎬</div>
                    <p class="text-lg">等待剧本分析</p>
                    <p class="text-sm mt-2">上传剧本后将自动生成视觉风格定位</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局状态
        let appState = {
            scenes: [],
            currentSceneIndex: -1,
            rawScriptText: '',
            visualStyle: {
                atmosphere: '',      // 氛围基调
                colorTone: '',       // 色彩倾向
                lighting: ''         // 光影质感
            },
            styleLocked: false,
            characterReferences: [],
            sceneReferences: [],
            isGenerating: false,
            editingShot: null,
            editingStyle: false,
            debugLogs: [],
            maxRefCount: 10
        };

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('apiKey').value = localStorage.getItem('apiyi_key') || '';
            
            const uploadZone = document.getElementById('uploadZone');
            const fileInput = document.getElementById('fileInput');
            
            uploadZone.addEventListener('click', () => fileInput.click());
            uploadZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadZone.style.borderColor = '#10b981';
            });
            uploadZone.addEventListener('dragleave', () => {
                uploadZone.style.borderColor = '#444';
            });
            uploadZone.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadZone.style.borderColor = '#444';
                if (e.dataTransfer.files.length > 0) {
                    handleFile(e.dataTransfer.files[0]);
                }
            });
            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    handleFile(e.target.files[0]);
                }
            });

            document.getElementById('apiKey').addEventListener('change', (e) => {
                localStorage.setItem('apiyi_key', e.target.value);
            });
        });

        // 调试日志
        function logDebug(msg, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = { time: timestamp, msg, type };
            appState.debugLogs.unshift(logEntry);
            if (appState.debugLogs.length > 5) {
                appState.debugLogs = appState.debugLogs.slice(0, 5);
            }
            updateDebugPanel();
            console.log(`[${type}] ${msg}`);
        }

        function updateDebugPanel() {
            const panel = document.getElementById('debugPanel');
            panel.innerHTML = appState.debugLogs.map(log => 
                `<div class="log-entry ${log.type}">[${log.time}] ${log.msg}</div>`
            ).join('');
        }

        function clearDebug() {
            appState.debugLogs = [];
            updateDebugPanel();
        }

        // 文件上传
        async function handleFile(file) {
            const uploadZone = document.getElementById('uploadZone');
            try {
                let text = '';
                if (file.name.endsWith('.docx') || file.name.endsWith('.doc')) {
                    const arrayBuffer = await file.arrayBuffer();
                    const result = await mammoth.extractRawText({ arrayBuffer });
                    text = result.value;
                } else {
                    text = await file.text();
                }

                appState.rawScriptText = text;
                uploadZone.classList.add('success');
                uploadZone.innerHTML = `
                    <div class="text-2xl mb-2">✅</div>
                    <div class="text-sm text-neutral-300">${file.name}</div>
                `;
                document.getElementById('analyzeBtn').disabled = false;
            } catch (error) {
                uploadZone.innerHTML = `<div class="text-2xl mb-2">❌</div><div class="text-sm text-red-400">读取失败</div>`;
            }
        }

        // AI分析剧本 - 生成视觉风格 + 拆分场次
        async function analyzeScript() {
            const apiKey = document.getElementById('apiKey').value.trim();
            if (!apiKey) { 
                alert('请输入 API Key'); 
                return; 
            }
            if (!appState.rawScriptText) { 
                alert('请先上传剧本'); 
                return; 
            }

            const btn = document.getElementById('analyzeBtn');
            const textModel = document.getElementById('textModelSelect').value;
            btn.disabled = true;
            btn.textContent = '分析中...';

            try {
                const baseUrl = document.getElementById('apiEndpoint').value;
                
                // 第一步：分析视觉风格 + 拆分剧本
                logDebug(`使用 ${textModel} 分析剧本...`, 'info');
                
                const response = await fetch(`${baseUrl}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: textModel,
                        messages: [{
                            role: 'user',
                            content: `请分析以下剧本，完成两个任务：

任务1：生成视觉风格定位
从剧本中提取整体视觉风格，从以下三个维度描述：
- 氛围基调（如：压抑沉重、紧张悬疑、温暖怀旧等）
- 色彩倾向（如：冷色调偏蓝、暖色调偏黄、高对比黑白等）
- 光影质感（如：硬光强烈对比、柔光散射、自然光写实等）

任务2：拆分剧本结构
按场次拆分剧本，包含场景、时间、人物、分镜。

请返回以下JSON格式：
{
  "visualStyle": {
    "atmosphere": "氛围基调描述（详细具体）",
    "colorTone": "色彩倾向描述（详细具体）",
    "lighting": "光影质感描述（详细具体）"
  },
  "scenes": [
    {
      "id": 1,
      "location": "场景地点",
      "time": "时间",
      "characters": ["人物1", "人物2"],
      "shots": [
        {
          "number": "01",
          "camera": "运镜方式",
          "content": "画面内容描述",
          "audio": "音效/对白"
        }
      ]
    }
  ],
  "allCharacters": ["所有出现的人物"],
  "allLocations": ["所有出现的场景"]
}

剧本内容：
${appState.rawScriptText.substring(0, 15000)}`
                        }],
                        temperature: 0.7
                    })
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                const content = data.choices[0].message.content;
                const jsonMatch = content.match(/\{[\s\S]*\}/);
                if (!jsonMatch) throw new Error('返回格式错误');
                
                const parsed = JSON.parse(jsonMatch[0]);
                
                // 保存视觉风格
                appState.visualStyle = parsed.visualStyle || {
                    atmosphere: ' cinematic atmosphere',
                    colorTone: 'natural color grading',
                    lighting: 'professional cinematic lighting'
                };
                
                // 保存场次数据
                appState.scenes = parsed.scenes.map((scene, idx) => ({
                    ...scene,

        function uploadCharRef(refId) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                if (e.target.files.length > 0) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const ref = appState.characterReferences.find(r => r.id === refId);
                        if (ref) {
                            ref.url = event.target.result;
                            renderCharacterReferences();
                            logDebug(`已上传人物参考: ${ref.name}`, 'success');
                        }
                    };
                    reader.readAsDataURL(e.target.files[0]);
                }
            };
            input.click();
        }

            const input = document.createElement('input');
            input.type = 'file';

        // 生成图片 - 结合视觉风格 + 参考图
        async function generateSingleShot(shotId) {
            const apiKey = document.getElementById('apiKey').value.trim();
            if (!apiKey) {
                alert('请输入 API Key');
                return;
            }

            const scene = appState.scenes[appState.currentSceneIndex];
            const shot = scene.shots.find(s => s.id === shotId);
            if (!shot || shot.isGenerating) return;

            // 检查风格锁定
            if (!appState.styleLocked) {
                alert('请先锁定视觉风格');
                return;
            }

            // 获取匹配的参考图
            const matchedScene = appState.sceneReferences.find(r => 
                r.name === scene.location && r.url
            );
            
            const matchedChars = scene.characters.map(char => ({
                name: char,
                ref: appState.characterReferences.find(r => r.name === char && r.url)
            })).filter(c => c.ref);

            if (!matchedScene && matchedChars.length === 0) {
                alert('请至少上传一个场景或人物参考图');
                return;
            }

            shot.isGenerating = true;
            displayCurrentScene();

            try {
                logDebug(`开始图生图: ${shot.number}`, 'info');
                
                const imageUrl = await img2imgGenerate(
                    scene, 
                    shot, 
                    apiKey, 
                    matchedScene, 
                    matchedChars
                );
                
                shot.generatedImage = imageUrl;
                logDebug(`分镜 ${shot.number} 生成成功`, 'success');
                
            } catch (error) {
                logDebug(`生成失败: ${error.message}`, 'error');
                alert('生成失败: ' + error.message);
            } finally {
                shot.isGenerating = false;
                displayCurrentScene();
            }
        }

        // 图生图核心函数
        async function img2imgGenerate(scene, shot, apiKey, sceneRef, charRefs) {
            const baseUrl = document.getElementById('apiEndpoint').value;
            
            // 构建视觉风格提示词
            const visualPrompt = `
Visual Style:
- Atmosphere: ${appState.visualStyle.atmosphere}
- Color Tone: ${appState.visualStyle.colorTone}  
- Lighting: ${appState.visualStyle.lighting}
`.trim();

            // 构建内容提示词
            const contentPrompt = `
Scene: ${scene.location} | ${scene.time}
Shot: ${shot.number} | Camera: ${shot.camera}
Action: ${shot.content}
Characters: ${scene.characters.join(', ')}
`.trim();

            // 组合完整提示词
            const fullPrompt = `${visualPrompt}

${contentPrompt}

Cinematic storyboard frame, professional composition, high quality. NO text, NO numbers, NO labels in image.`;

            // 准备参考图数据
            let mainImage = null;
            const refImages = [];
            
            // 优先使用场景参考作为主图
            if (sceneRef) {
                mainImage = sceneRef.url;
                logDebug(`使用场景参考: ${sceneRef.name}`, 'info');
            }
            
            // 添加人物参考
            charRefs.forEach(c => {
                refImages.push(c.ref.url);
                logDebug(`使用人物参考: ${c.name}`, 'info');
            });

            // 构建请求体 - 尝试不同的参数组合
            const requestBody = {
                model: 'nano-banana-pro',
                prompt: fullPrompt,
                size: '1024x576',
                response_format: 'b64_json',
                quality: 'high'
            };

            // 如果场景参考存在，尝试作为基础图像
            if (mainImage) {
                // 方法1: 使用 image_url 参数（某些API支持）
                requestBody.image_url = mainImage;
                
                // 方法2: 使用参考图像参数
                if (refImages.length > 0) {
                    requestBody.reference_images = refImages.slice(0, 3);
                }
            }

            logDebug('发送图生图请求...', 'info');

            const response = await fetch(`${baseUrl}/images/generations`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${apiKey}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(requestBody)
            });

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.error?.message || `HTTP ${response.status}`);
            }
            
            const data = await response.json();
            if (!data.data || !data.data[0] || !data.data[0].b64_json) {
                throw new Error('返回数据格式错误');
            }

            return `data:image/png;base64,${data.data[0].b64_json}`;
        }

        // 批量生成
        async function generateStoryboard() {
            const apiKey = document.getElementById('apiKey').value.trim();
            if (!apiKey) { 
                alert('请输入 API Key'); 
                return; 
            }

            if (!appState.styleLocked) {
                alert('请先锁定视觉风格');
                return;
            }

            const selectedScenes = appState.scenes.filter(s => s.selected);
            if (selectedScenes.length === 0) return;

            appState.isGenerating = true;
            updateScenesList();
            
            document.getElementById('generateBtn').disabled = true;
            document.getElementById('progressContainer').classList.remove('hidden');

            let totalShots = 0;
            let completedShots = 0;
            selectedScenes.forEach(s => totalShots += s.shots.length);

            try {
                for (const scene of selectedScenes) {
                    const matchedScene = appState.sceneReferences.find(r => 
                        r.name === scene.location && r.url
                    );
                    
                    const matchedChars = scene.characters.map(char => ({
                        name: char,
                        ref: appState.characterReferences.find(r => r.name === char && r.url)
                    })).filter(c => c.ref);

                    // 跳过无参考图的场次
                    if (!matchedScene && matchedChars.length === 0) {
                        logDebug(`场次 ${scene.id} 跳过: 无参考图`, 'warning');
                        continue;
                    }

                    for (const shot of scene.shots) {
                        document.getElementById('progressText').textContent = 
                            `生成中: 场次${scene.id} 分镜${shot.number} (${completedShots + 1}/${totalShots})`;
                        document.getElementById('progressFill').style.width = 
                            `${(completedShots / totalShots) * 100}%`;
                        
                        shot.isGenerating = true;
                        displayCurrentScene();
                        
                        try {
                            const imageUrl = await img2imgGenerate(
                                scene, shot, apiKey, matchedScene, matchedChars
                            );
                            shot.generatedImage = imageUrl;
                            completedShots++;
                        } catch (error) {
                            logDebug(`分镜 ${shot.number} 失败: ${error.message}`, 'error');
                        } finally {
                            shot.isGenerating = false;
                            displayCurrentScene();
                        }
                        
                        await new Promise(r => setTimeout(r, 1200));
                    }
                }
                
                document.getElementById('progressText').textContent = 
                    `完成 ${completedShots}/${totalShots}`;
                setTimeout(() => {
                    document.getElementById('progressContainer').classList.add('hidden');
                }, 2000);
                
            } catch (error) {
                logDebug(`批量生成中断: ${error.message}`, 'error');
            }

            appState.isGenerating = false;
            document.getElementById('generateBtn').disabled = false;
            updateScenesList();
        }
    </script>
</body>
</html>
